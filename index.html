<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Static Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to My DevOps Project</h1>
        <p>This is a static website deployed using GitHub, Jenkins, Docker, and AWS EC2.</p>

        <button onclick="showMessage()">Click Me</button>

        <p id="msg"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText =
            "Hello! Your DevOps pipeline is working perfectly 🚀";
        }
    </script>

</body>
</html>
